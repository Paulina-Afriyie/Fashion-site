</div>

<div class="card">
  <img src="images/dress.jpg" alt="ladies dress">
<h3>Dress</h3>

<button onclick="addToCart('Dress',60)">Add to Cart</button>
</div>

</div>

<button onclick="addToCart('Party Dress',70)">Add to Cart</button>
</div>






</div>

<div class="cart" id="cart">

<ul id="cart-items"></ul>
<p>Total: $<span id="total">0</span></p>
<button onclick="clearCart()">Clear Cart</button>
</div>
