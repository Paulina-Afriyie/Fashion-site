<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

</head>

<body>



<header>
         <nav class="navbar">
  <div class="logo"><img src="images/46f1ed0da1faed43a5b19c7b7473af98.jpg" alt=""></div>

 
  <input type="checkbox" id="menu-toggle">


  <label for="menu-toggle" class="hamburger">
    ☰
  </label>


  <label for="menu-toggle" class="close">
    ✕
  </label>


  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
   
    <li><a href="index2.html">Shop</a></li>
 
 <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
</nav>  
  
</header>
<p><a href="index.html" class="back">back to home</a></p>
<section class="page">
<h1>Shop Products</h1>

<div class="grid">

<div class="card">
<img src="images/ashirts.jpg">
<h3>T-Shirt</h3>
<p>$20</p>
<button onclick="addToCart('T-Shirt',20)">Add to Cart</button>
</div>

<div class="card">
<img src="images/jacket.jpg">
<h3>Jacket</h3>
<p>$45</p>
<button onclick="addToCart('Jacket',45)">Add to Cart</button>
</div>

<div class="card">
<img src="images/dress.jpg">
<h3>Dress</h3>
<p>$60</p>
<button onclick="addToCart('Dress',60)">Add to Cart</button>
</div>

<div class="card">
<img src="images/shoes.jpg">
<h3>Shoes</h3>
<p>$70</p>
<button onclick="addToCart('Shoes',70)">Add to Cart</button>
</div>

</div>
</section>

<!-- CART -->
<div class="cart" id="cart">
<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<p>Total: $<span id="total">0</span></p>
<button onclick="clearCart()">Clear Cart</button>
</div>

<script src="js/script.js"></script>

</body>
</html>
