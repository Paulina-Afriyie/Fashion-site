<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shop</title>
<link rel="stylesheet" href="index.css">

<script src="index.js"></script>
</head>

<body>

<header>
<div class="logo"> <img src="images/46f1ed0da1faed43a5b19c7b7473af98.jpg" alt=""><p>Paulina's Fashion</p></div>

<nav>
<a href="index.html">Home</a>
<a href="index2.html">Shop</a>
</nav>

<div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
</header>

<section class="page">
<h1>Shop Products</h1>

<div class="grid">

<div class="card">
<img src="images/ashirts.jpg">
<h3>T-Shirt</h3>
<p>$20</p>
<button onclick="addToCart('T-Shirt',20)">Add to Cart</button>
</div>

<div class="card">
<img src="images/jacket.jpg">
<h3>Jacket</h3>
<p>$45</p>
<button onclick="addToCart('Jacket',45)">Add to Cart</button>
</div>

<div class="card">
<img src="images/dress.jpg">
<h3>Dress</h3>
<p>$60</p>
<button onclick="addToCart('Dress',60)">Add to Cart</button>
</div>

<div class="card">
<img src="images/shoes.jpg">
<h3>Shoes</h3>
<p>$70</p>
<button onclick="addToCart('Shoes',70)">Add to Cart</button>
</div>

</div>
</section>

<!-- CART -->
<div class="cart" id="cart">
<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<p>Total: $<span id="total">0</span></p>
<button onclick="clearCart()">Clear Cart</button>
</div>

<script src="js/script.js"></script>

</body>
</html>
